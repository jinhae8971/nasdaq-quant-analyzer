name: NASDAQ Quant Analyzer — Daily Report

on:
  schedule:
    # 매일 미국 동부시간 장 마감 후 KST 08:00 = UTC 23:00 (일~목)
    - cron: "0 23 * * 0-4"
  workflow_dispatch:
    inputs:
      debug_mode:
        description: "Debug 모드 (상세 로그)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NASDAQ Quant Analyzer pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: "America/New_York"
          PYTHONPATH: ${{ github.workspace }}
          DEBUG: ${{ github.event.inputs.debug_mode || 'false' }}
          MODEL: "claude-sonnet-4-20250514"
          TOP_N: "10"
        run: |
          python scripts/run_pipeline.py

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/ || true
          git add data/history/ || true
          git status --short
          git diff --staged --quiet || \
            git commit -m "chore: daily report $(date +'%Y-%m-%d')"
          git push

      - name: Notify failure via Telegram
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PYEOF'
          import os, requests, sys
          token   = os.environ.get("TELEGRAM_TOKEN",   "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          if not token or not chat_id:
              sys.exit(0)
          msg = "❌ NASDAQ Quant Analyzer 실행 실패!\nhttps://github.com/${{ github.repository }}/actions"
          requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={"chat_id": chat_id, "text": msg},
              timeout=10,
          )
          PYEOF
